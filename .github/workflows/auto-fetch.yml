name: 自动双源无损强行合并-备用线

on:
  schedule:
    # 🎯 彻底避开整点塞车！换算北京时间为早上 8:43 和晚上 20:43 准时全自动合流
    - cron: '43 0,12 * * *'
  workflow_dispatch: 

jobs:
  fetch-and-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout own repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 1. 下载三个源（加入老张直链下载）
    - name: Fetch target files
      run: |
        mkdir -p datas
        curl -L "https://cnb.cool/fish2018/xs/-/git/raw/main/api.json" -o datas/cnb.json
        curl -L "https://raw.githubusercontent.com/FGBLH/GHK/refs/heads/main/海豚666.json" -o datas/haitun.json
        curl -L "https://gh-proxy.com/https://raw.githubusercontent.com/ediart/tvbox/refs/heads/main/lz/py.json" -o datas/lz.json

    # 2. 强行文本拼接合并（执行统一命名的 modify_config.py）
    - name: Text Merge JSON
      run: |
        python modify_config.py

    # 3. 核心修正：大写 name 纠偏，强行同步物理删除，实现彻底断流（核心黑科技原封不动）
    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 🌟 强行记录所有变化（包括新生成的 老杨TV全功能版.json 和洗牌产生的随机旧线大轰炸文件）
        git add -A
        
        if git diff-index --quiet HEAD; then
          echo "文件没有变化，无需更新。"
        else
          git commit -m "双源文本级硬核合并 (老杨TV全功能版): $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi
