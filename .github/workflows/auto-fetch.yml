name: 自动双源无损强行合并-备用线

on:
  schedule:
    - cron: '43 0,12 * * *'
  workflow_dispatch: 

# 🌟 显式强制赋予工作流全部写权限，解决 128 报错的关键
permissions: write-all

jobs:
  fetch-and-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout own repo
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Fetch target files
      run: |
        mkdir -p datas
        # 保留 cnb 与 lz 两个固定路径上游的常规下载
        curl -L "https://cnb.cool/fish2018/xs/-/git/raw/main/api.json" -o datas/cnb.json
        curl -L "https://gh-proxy.com/https://raw.githubusercontent.com/ediart/tvbox/refs/heads/main/lz/py.json" -o datas/lz.json
        # 💡 提示：haitun.json 的动态检索与下载已交由下方 Python 脚本无感接管，此处无需再硬编码 curl

    - name: Text Merge JSON
      env:
        MY_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 🔑 核心注入：将官方内置令牌传给变量，供 Python 脚本过白名单防限流
      run: |
        # 🛠️ 精准对齐：已修正为你仓库中的标准脚本名称 "ColorWin_Monitor_Final.py"
        python ColorWin_Monitor_Final.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 🛠️ 修复：禁止 Git 对中文路径进行转义，彻底解决乱码匹配不到文件的问题
        git config --global core.quotepath false
        
        # 🛠️ 终极改动：直接添加整个 datas 文件夹，不再由于找不到历史文件而导致 Git 崩溃
        git add datas/
        
        # 🛠️ 终极保险：改用 --cached 精准比对暂存区行内容。只有内容真正改变才 commit，即便时间戳变了也绝不误报
        if ! git diff --cached --exit-code --quiet; then
          git commit -m "双源自适应硬核合并 (蝴蝶影视全量版系列): $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:${{ github.ref_name }}
        else
          echo "文件内容没有发生实际变化，无需更新，优雅退出。"
        fi
