name: 自动双源无损强行合并-备用线

on:
  schedule:
    # 🎯 北京时间早上 8:43 和晚上 20:43 准时全自动运行
    - cron: '43 0,12 * * *'
  workflow_dispatch: 

# 🌟 赋予最高读写写权限
permissions: write-all

jobs:
  fetch-and-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout own repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 1. 下载大底包
    - name: Fetch target files
      run: |
        mkdir -p datas
        curl -L "https://cnb.cool/fish2018/xs/-/git/raw/main/api.json" -o datas/cnb.json
        curl -L "https://raw.githubusercontent.com/FGBLH/GHK/refs/heads/main/海豚666.json" -o datas/haitun.json

    # 2. 执行双层高阶安全缝合清洗脚本
    - name: Text Merge JSON
      run: |
        python modify_config.py

    # 3. 🎯 正常同步更新：把开关、追踪文本、JSON文件全部一网打尽推送到仓库
    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 🌟 正常更新所有文件
        git add datas/控制开关.txt || true
        git add datas/最新接口文件名.txt || true
        git add datas/老杨TV纯净版*.json || true
        
        if git diff-index --quiet HEAD; then
          echo "文件没有变化，无需更新。"
        else
          git commit -m "双源自适应高阶净化合并 (标准生成发布版): $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi
